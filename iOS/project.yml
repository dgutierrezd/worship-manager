name: WorshipFlow
options:
  bundleIdPrefix: com.dgutierrezd
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 8
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  WorshipFlow:
    type: application
    platform: iOS
    sources:
      - WorshipFlow
    dependencies:
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseCore
    settings:
      base:
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIBackgroundModes: "remote-notification"
        PRODUCT_BUNDLE_IDENTIFIER: com.dgutierrezd.worshipflow
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: WorshipFlow/WorshipFlow.entitlements
        DEVELOPMENT_TEAM: UMM993JNZH
        INFOPLIST_KEY_CFBundleDisplayName: "Worship Manager"
        # Spanish is the primary language. This drives the "Base" locale
        # used for system-rendered strings and the default App Store listing.
        DEVELOPMENT_LANGUAGE: es
        INFOPLIST_KEY_CFBundleLocalizations: "es en"
        # System permission prompts are shown in the user's device language,
        # so we provide the primary copy in Spanish here. Per-language
        # overrides live in *.lproj/InfoPlist.strings.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Worship Manager necesita acceso a tu biblioteca de fotos para establecer la imagen de la banda."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Worship Manager usa tu calendario para añadir servicios y ensayos como eventos."
